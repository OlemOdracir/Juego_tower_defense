<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iron Bastion - Tower Defense</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div id="game-container">
    <div id="viewport">
      <div id="hud">
        <div>
          <div>
            <span class="hud-stat">Creditos <span class="hud-val" id="credits">250</span></span>
            <span class="hud-stat">Oleada <span class="hud-val" id="wave">0</span>/10</span>
            <span class="hud-stat">Enemigos <span class="hud-val" id="enemy-count">0</span></span>
          </div>
          <div id="life-bar-wrap">
            <div id="life-bar-outer"><div id="life-bar-fill"></div></div>
          </div>
        </div>
        <div style="display:flex;gap:5px">
          <button class="hud-btn" onclick="window.resetWave()">Reset Oleada</button>
          <button class="hud-btn" onclick="window.resetAll()">Reset Todo</button>
        </div>
      </div>

      <div id="dev-controls">
        <label class="dev-toggle">
          <input type="checkbox" id="dev-mode-toggle" />
          <span>Modo Desarrollo</span>
        </label>
        <div id="dev-config" hidden>
          <div class="dev-help">Dinero infinito + override de enemigos para la siguiente oleada.</div>
          <div class="dev-field">
            <span>Cantidad</span>
            <input id="dev-wave-count" type="number" min="1" max="200" value="16" />
          </div>
          <div class="dev-field">
            <span>Intervalo (s)</span>
            <input id="dev-wave-interval" type="number" min="0.1" max="5" step="0.05" value="0.72" />
          </div>
          <div class="dev-actions">
            <button id="dev-select-all" type="button">Todos</button>
            <button id="dev-clear-all" type="button">Ninguno</button>
          </div>
          <div id="dev-enemy-list"></div>
        </div>
      </div>

      <div class="tower-selector">
        <div class="tower-card">
          <div style="width:14px;height:14px;background:#378ADD;border-radius:3px;margin:0 auto 3px"></div>
          MG-7<br><span style="color:#FACC15">$50</span>
        </div>
      </div>

      <button id="wave-btn" onclick="window.startWave()">▶ Oleada 1</button>

      <div id="tip">Click = colocar · Click torre = inspeccionar · Scroll = zoom · Derecho = rotar</div>

      <div id="overlay">
        <h2 id="overlay-title"></h2>
        <p id="overlay-text"></p>
        <button style="background:#22C55E" onclick="window.resetWave()">Reset Oleada</button>
        <button style="background:#3B82F6" onclick="window.resetAll()">Reset Todo</button>
      </div>

      <div id="confirm-dialog">
        <div class="confirm-box">
          <h3 id="confirm-title"></h3>
          <p id="confirm-text"></p>
          <div class="confirm-amount" id="confirm-amount"></div>
          <div class="confirm-buttons">
            <button class="confirm-no" onclick="window.cancelSell()">Cancelar</button>
            <button class="confirm-yes" onclick="window.confirmSell()">Confirmar</button>
          </div>
        </div>
      </div>
    </div>

    <div id="panel" class="panel-empty">
      <div class="panel-core">
        <div id="preview-3d">
          <div id="preview-label">DETALLE DE UNIDAD</div>
        </div>
        <div id="stats-section"></div>
        <div id="actions-section"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
